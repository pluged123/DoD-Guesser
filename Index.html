<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>DOD GUESSER</title>
</head>

<body style="background-color:#1a1a1a; color:white;">

  <h1 style="text-align:center; font-size:75px; color:#FFFF00;">
    Dod Guesser
  </h1>

  <h1 style="text-align:center; font-size:20px;">
    All credits go to the Devs of Die of Death!
  </h1>

  <!-- IMAGE AREA -->
  <div id="imageContainer" style="
      width:300px;
      height:300px;
      overflow:hidden;
      margin:auto;
      position:relative;
  ">

    <img
      id="gameImage"
      src=""
      style="
        width:100%;
        height:100%;
        transform-origin:center;
      "
    >

    <div id="resultText" style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      font-size:40px;
      font-weight:bold;
      display:none;
      text-shadow: 2px 2px 5px black;
    "></div>

  </div>

  <!-- INPUT AREA -->
  <div style="text-align:center; margin-top:20px;">
    <input type="text" id="answerBox" placeholder="Enter your guess">
    <button onclick="checkAnswer()">Submit</button>
    <button onclick="pass()">Pass</button>
  </div>

  <script>
    // IMAGE DATABASE
    const characters = [
      { image: "Pursuer.png", answer: "pursuer" },
      { image: "Avoider.png", answer: "avoider" },
      { image: "Classic.png", answer: "classic" },
      { image: "Phantasm.png", answer: "phantasm" },
      { image: "Stalker.png", answer: "stalker" },
      { image: "Zombie.png", answer: "zombie" },
      { image: "Zombie_1.png", answer: "zombie_1" },
      { image: "Zombie_2.png", answer: "zombie_2" },
      { image: "Mequot.png", answer: "mequot" },
      { image: "IQuot.png", answer: "iquot" },
      { image: "MazeGuy.png", answer: "mazeguy" },
      { image: "HardestGame.png", answer: "hardest game" },
      { image: "ClawsGuy.png", answer: "clawsguy" },
      { image: "Thec.png", answer: "thec" },
      { image: "Bling.png", answer: "bling" },
      { image: "MISO.png", answer: "miso" },
  
      { image: "Badware.png", answer: "badware" },
      { image: "Artful.png", answer: "artful" },
      { image: "Harken.png", answer: "harken" },
      { image: "Killdroid.png", answer: "killdroid" },
    ];

    let currentCharacter;
  
    function setRandomZoomPoint() {
      const x = Math.floor(Math.random() * 100);
      const y = Math.floor(Math.random() * 100);
      
      document.getElementById("gameImage").style.transformOrigin =
      x + "% " + y + "%";
    }

    // LOAD RANDOM IMAGE
    function loadRandomCharacter() {
      currentCharacter =
        characters[Math.floor(Math.random() * characters.length)];

      document.getElementById("gameImage").src =
        "./Images/" + currentCharacter.image;

      document.getElementById("gameImage").style.transform = "scale(10)";
      
      setRandomZoomPoint();

      document.getElementById("resultText").style.display = "none";

      document.getElementById("answerBox").value = "";
    }

    // CHECK ANSWER
    function checkAnswer() {
      const answer = document
        .getElementById("answerBox")
        .value
        .toLowerCase()
        .trim();

      const resultText = document.getElementById("resultText");

      if (answer === currentCharacter.answer) {

        document.getElementById("gameImage").style.transform = "scale(1)";

        resultText.textContent = "CORRECT!";
        resultText.style.color = "#00ff00";
        resultText.style.display = "block";

        setTimeout(loadRandomCharacter, 2500);

      } else {

        resultText.textContent = "INCORRECT!";
        resultText.style.color = "#ff0000";
        resultText.style.display = "block";

        setTimeout(() => {
          resultText.style.display = "none";
        }, 1200);
      }
    }
  
    function pass() {
      document.getElementById("gameImage").style.transform = "scale(1)";
      
      resultText.textContent = currentCharacter.answer;
      resultText.style.color = "ffff00";
      resultText.style.display = "block";
      
      setTimeout(loadRandomCharacter, 2500);
    }

    // START GAME
    loadRandomCharacter();
  </script>

</body>
</html>
